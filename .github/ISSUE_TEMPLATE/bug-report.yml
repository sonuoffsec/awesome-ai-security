name: "Bug Report / Broken Link"
description: "Report a broken link, incorrect information, or other error"
title: "[Bug]: "
labels: ["bug", "good-first-issue"]
body:
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Broken Link
        - Incorrect Information
        - Outdated Content
        - Formatting Error
        - Other
    validations:
      required: true

  - type: input
    id: file-location
    attributes:
      label: File / Section
      placeholder: "e.g. tools/README.md — Prompt Injection Testing section"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      placeholder: "Describe the issue."
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: Suggested Fix
      placeholder: "If you know the correct link or content, add it here."
